name: matchlog
description: >
  MatchLog — Social Sports Diary & Betting Tracker.
  Log matches you've watched, track betting ROI across bookmakers,
  follow friends' predictions, and get AI-powered insights.
  Letterboxd meets Strava, but for football.
publish_to: 'none'

# Versioning: MAJOR.MINOR.PATCH+BUILD
# 1.0.0+1  → Phase 1 (core diary + betting tracker)
# 1.1.0+x  → Phase 1.5 (notifications, heatmap, stadium check-in)
# 2.0.0+x  → Phase 2 (social layer, Bookie Groups)
# 3.0.0+x  → Phase 3 (AI insights, Prediction Leagues)
# 4.0.0+x  → Phase 4 (Spring Boot backend migration)
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.2.0

  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local DB (Offline-First)
  drift: ^2.18.0                 # Type-safe SQLite ORM for all writes
  sqlite3_flutter_libs: ^0.5.20  # Native SQLite binaries for Android + iOS

  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.1    # Push notifs via FCM

  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.1
  google_fonts: ^6.2.1

  image_picker: ^1.1.1
  image_cropper: ^7.0.5          # Manual crop for bet slip scanning
  share_plus: ^9.0.0

  # Local notification channels + display
  flutter_local_notifications: ^17.2.1+2

  # Localization
  geolocator: ^12.0.0            # GPS for stadium check-in verification
  geocoding: ^3.0.0              # Reverse geocoding (coordinates → venue name)

  # Android App Links + iOS Universal Links handler
  app_links: ^6.1.1

  # Secure Storage(Keychain / EncryptedSharedPrefs)
  flutter_secure_storage: ^9.2.2

  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1     # Immutable data class annotations
  json_annotation: ^4.9.0        # JSON serialization annotations
  path_provider: ^2.1.4          # App documents directory for Drift database file
  path: ^1.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9 
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2                # Generates immutable data classes + copyWith
  json_serializable: ^6.8.0      # Generates fromJson / toJson methods
  drift_dev: ^2.18.0

  mockito: ^5.4.4
  mocktail: ^1.0.3

  flutter_lints: ^5.0.0

# ── Flutter ───────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
